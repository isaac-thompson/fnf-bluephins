<section class="hero">

  <!-- Bluephins crest — pinned top-left -->
  <a href="https://bluephins.ca" target="_blank" rel="noopener" class="hero__crest-corner" aria-label="Charlottetown Bluephins">
    <img src="images/bluephins-crest.svg" alt="Charlottetown Bluephins" />
  </a>

  <!-- SERF logo — pinned top-right -->
  <a href="https://www.charlottetown.ca" target="_blank" rel="noopener" class="hero__serf-corner" aria-label="Charlottetown SERF – Special Events Reserve Fund">
    <img src="images/SERF.png" alt="Charlottetown SERF Special Events Reserve Fund" />
  </a>

  <div class="hero__inner container">

    <!-- F&F Logo -->
    <div class="hero__logo">
      <img src="images/fnf-logo.svg" alt="Fast & Furious 2026" />
    </div>

    <!-- Tagline -->
    <p class="hero__tagline">Charlottetown's Premier Swim Meet</p>

  </div>

  <!-- Wave separator between hero and countdown -->
  <div class="hero__wave">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0,40 C360,80 1080,0 1440,40 L1440,80 L0,80 Z" fill="#021630"/>
    </svg>
  </div>

  <!-- Countdown + CTAs sit below the wave on dark bg -->
  <div class="hero__below-wave">
    <app-countdown></app-countdown>
    <div class="hero__ctas">
      <a href="https://www.swimming.ca/swim-meet/61717/" target="_blank" rel="noopener" class="btn btn-primary">
        Meet Info &amp; Package
      </a>
      <a href="#event-info" class="btn btn-outline">Event Details</a>
    </div>
  </div>

</section>
